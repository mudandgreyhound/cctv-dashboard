<!doctype html>
<html lang="th" data-t="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ — CCTV Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafafa;--bg2:#fff;--bg3:#f2f2f0;--fg:#111;--fg2:#444;--fg3:#888;--fg4:#aaa;
  --border:#e5e5e3;--card:#fff;--accent:#111;--red:#dc2626;
  --r:14px;--r2:10px;--ease:cubic-bezier(.22,.61,.36,1);--sans:'Prompt',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 10px 40px rgba(0,0,0,.06);
}
[data-t="dark"]{
  --bg:#0c0c0c;--bg2:#161616;--bg3:#1c1c1a;--fg:#eee;--fg2:#bbb;--fg3:#777;--fg4:#555;
  --border:#222;--card:#161616;--accent:#eee;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 10px 40px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);min-height:100vh;
  display:grid;place-items:center;padding:20px;
  transition:background .3s var(--ease),color .3s var(--ease);
  background-image:radial-gradient(60% 50% at 50% 0%,color-mix(in srgb,var(--fg) 5%,transparent),transparent)}
.themebtn{position:fixed;top:16px;right:16px;width:40px;height:40px;border-radius:50px;border:1px solid var(--border);
  background:var(--bg2);color:inherit;font-size:16px;cursor:pointer;transition:background .2s}
.themebtn:hover{background:var(--bg3)} .themebtn:active{transform:scale(.95)}

.card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);padding:34px 30px}
.logo{width:54px;height:54px;border-radius:15px;background:var(--accent);color:var(--bg);
  display:grid;place-items:center;font-size:26px;margin:0 auto 16px}
h1{font-size:20px;font-weight:600;text-align:center}
.sub{font-size:13px;color:var(--fg3);text-align:center;margin-top:4px;margin-bottom:26px}

label{display:block;font-size:12px;font-weight:500;color:var(--fg2);margin:0 0 6px 2px}
.field{margin-bottom:16px}
.inp{width:100%;border:1.5px solid var(--border);border-radius:var(--r2);background:var(--bg2);
  color:var(--fg);font-family:var(--sans);font-size:14px;padding:12px 14px;outline:none;
  transition:border .2s}
.inp:focus{border-color:var(--fg3)}
.inp::placeholder{color:var(--fg4)}
.pwwrap{position:relative}
.pwtoggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;
  color:var(--fg4);cursor:pointer;font-size:13px;padding:4px}

.btn{width:100%;border:none;border-radius:50px;background:var(--accent);color:var(--bg);
  font-family:var(--sans);font-size:15px;font-weight:600;padding:13px;cursor:pointer;margin-top:6px;
  transition:opacity .2s}
.btn:hover{opacity:.9} .btn:active{transform:scale(.98)}
.btn:disabled{opacity:.55;cursor:not-allowed}

.err{display:none;background:color-mix(in srgb,var(--red) 12%,transparent);color:var(--red);
  border:1px solid color-mix(in srgb,var(--red) 30%,transparent);border-radius:var(--r2);
  font-size:13px;padding:10px 12px;margin-bottom:16px}
.err.show{display:block}
.foot{text-align:center;font-size:11px;color:var(--fg4);margin-top:22px;line-height:1.6}
.spin{display:inline-block;width:15px;height:15px;border:2px solid currentColor;border-top-color:transparent;
  border-radius:50%;animation:sp .6s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<button class="themebtn" id="themebtn" onclick="toggleTheme()">🌙</button>

<form class="card" id="form" onsubmit="doLogin(event)">
  <div class="logo">🎥</div>
  <h1>CCTV Monitor</h1>
  <div class="sub">เข้าสู่ระบบเพื่อดูสถานะกล้องวงจรปิด</div>

  <div class="err" id="err"></div>

  <div class="field">
    <label for="u">ชื่อผู้ใช้</label>
    <input class="inp" id="u" type="text" autocomplete="username" placeholder="username" required autofocus>
  </div>
  <div class="field">
    <label for="p">รหัสผ่าน</label>
    <div class="pwwrap">
      <input class="inp" id="p" type="password" autocomplete="current-password" placeholder="••••••••" required>
      <button type="button" class="pwtoggle" onclick="togglePw()" id="pwtoggle">แสดง</button>
    </div>
  </div>

  <button class="btn" id="btn" type="submit">เข้าสู่ระบบ</button>

  <div class="foot">CMC Group · IT Support<br>9 สาขา · Hikvision NVR/Camera</div>
</form>

<script>
/* ====== CONFIG (ให้ตรงกับ dashboard) ====== */
const API_BASE = 'https://cctvchecker.mobile1234.site';
const DASHBOARD = 'cctv_dashboard.html';   // ไฟล์ปลายทางหลัง login (อยู่โฟลเดอร์เดียวกัน)

/* ถ้ามี token อยู่แล้วและยังไม่หมดอายุ ข้ามไป dashboard เลย */
if(sessionStorage.getItem('cctv_token')) location.replace(DASHBOARD);

let theme='light';
function toggleTheme(){theme=theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-t',theme);
  document.getElementById('themebtn').textContent=theme==='light'?'🌙':'☀️';}
function togglePw(){const p=document.getElementById('p'),b=document.getElementById('pwtoggle');
  if(p.type==='password'){p.type='text';b.textContent='ซ่อน';}else{p.type='password';b.textContent='แสดง';}}

function showErr(msg){const e=document.getElementById('err');e.textContent=msg;e.classList.add('show');}

async function doLogin(ev){
  ev.preventDefault();
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const btn=document.getElementById('btn');
  document.getElementById('err').classList.remove('show');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>กำลังเข้าสู่ระบบ...';
  try{
    const r=await fetch(`${API_BASE}/api/cctv/login`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p})
    });
    if(r.ok){
      const d=await r.json();
      sessionStorage.setItem('cctv_token', d.token);
      sessionStorage.setItem('cctv_user', d.user);
      location.replace(DASHBOARD);
      return;
    }
    if(r.status===401) showErr('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
    else showErr('เข้าสู่ระบบไม่สำเร็จ (HTTP '+r.status+')');
  }catch(e){
    showErr('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ — ตรวจการเชื่อมต่อ');
  }
  btn.disabled=false; btn.textContent='เข้าสู่ระบบ';
}
</script>
</body>
</html>
