<!doctype html>
<html lang="th" data-t="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CCTV Monitor — CMC Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafafa;--bg2:#fff;--bg3:#f2f2f0;--bg4:#e8e8e5;
  --fg:#111;--fg2:#444;--fg3:#888;--fg4:#aaa;
  --border:#e5e5e3;--border2:#d0d0cd;--card:#fff;
  --online:#16a34a;--warning:#f59e0b;--offline:#dc2626;--blue:#2563eb;
  --r:14px;--r2:10px;--ease:cubic-bezier(.22,.61,.36,1);
  --sans:'Prompt',sans-serif;--shadow:0 1px 3px rgba(0,0,0,.06),0 6px 24px rgba(0,0,0,.04);
}
[data-t="dark"]{
  --bg:#0c0c0c;--bg2:#161616;--bg3:#1c1c1a;--bg4:#262624;
  --fg:#eee;--fg2:#bbb;--fg3:#777;--fg4:#555;
  --border:#222;--border2:#333;--card:#161616;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 24px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);font-weight:400;
  -webkit-font-smoothing:antialiased;transition:background .3s var(--ease),color .3s var(--ease)}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit}
button:active{transform:scale(.95)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
.dot.online{background:var(--online);box-shadow:0 0 0 3px color-mix(in srgb,var(--online) 25%,transparent)}
.dot.warning{background:var(--warning);box-shadow:0 0 0 3px color-mix(in srgb,var(--warning) 25%,transparent)}
.dot.offline{background:var(--offline);box-shadow:0 0 0 3px color-mix(in srgb,var(--offline) 25%,transparent)}

.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
  padding:14px 18px;background:color-mix(in srgb,var(--bg) 80%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:16px;flex:none}
.brand .logo{width:30px;height:30px;border-radius:9px;background:var(--fg);color:var(--bg);
  display:grid;place-items:center;font-size:15px}
.search{flex:1;min-width:140px;display:flex;align-items:center;gap:8px;background:var(--bg2);
  border:1.5px solid var(--border);border-radius:50px;padding:8px 14px;transition:border .2s}
.search:focus-within{border-color:var(--fg3)}
.search input{border:none;background:none;outline:none;color:var(--fg);font-size:14px;width:100%}
.search input::placeholder{color:var(--fg4)}
.sumchips{display:flex;gap:6px;flex:none}
.chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:50px;
  background:var(--bg2);border:1px solid var(--border);font-size:13px;font-weight:500}
.iconbtn{width:38px;height:38px;border-radius:50px;background:var(--bg2);border:1px solid var(--border);
  display:grid;place-items:center;font-size:15px;transition:background .2s}
.iconbtn:hover{background:var(--bg3)}
.iconbtn.spin svg{animation:spin .7s var(--ease)}
@keyframes spin{to{transform:rotate(360deg)}}

.wrap{max-width:1240px;margin:0 auto;padding:18px}

.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;box-shadow:var(--shadow)}
.stat .lbl{font-size:12px;color:var(--fg3);font-weight:500;letter-spacing:.2px}
.stat .val{font-size:30px;font-weight:600;margin-top:6px;line-height:1;display:flex;align-items:baseline;gap:8px}
.stat .val small{font-size:14px;color:var(--fg3);font-weight:400}
.stat.acc-online .val{color:var(--online)} .stat.acc-offline .val{color:var(--offline)} .stat.acc-warning .val{color:var(--warning)}

.tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;scroll-snap-type:x proximity}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:8px 16px;border-radius:50px;background:var(--bg2);border:1px solid var(--border);
  font-size:13px;font-weight:500;color:var(--fg2);transition:all .2s var(--ease);scroll-snap-align:start}
.tab.active{background:var(--fg);color:var(--bg);border-color:var(--fg)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.bcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--shadow);transition:transform .2s var(--ease),box-shadow .2s var(--ease);cursor:pointer}
.bcard:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.10)}
[data-t="dark"] .bcard:hover{box-shadow:0 8px 30px rgba(0,0,0,.5)}

.feed{position:relative;aspect-ratio:16/10;overflow:hidden;background:#0a0a0a}
.feed .scene{position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 2px,transparent 2px 4px),
  radial-gradient(120% 90% at 30% 20%,var(--h1),transparent 60%),
  radial-gradient(120% 90% at 80% 90%,var(--h2),transparent 65%),#0c0e12}
.feed .snap{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:block}
.feed .snap.snaperr{display:none}
.feedgrid{position:relative;aspect-ratio:16/10;background:#0a0a0a;display:grid;gap:2px;overflow:hidden}
.feedgrid.g1{grid-template-columns:1fr}
.feedgrid.g2{grid-template-columns:1fr 1fr}
.feedgrid.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.feedgrid .feed{aspect-ratio:auto;width:100%;height:100%}
.feedgrid .chtag{position:absolute;left:5px;bottom:5px;display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.5);color:#fff;font-size:9px;font-weight:600;padding:2px 6px;border-radius:5px}
.feedgrid .warndot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;
  background:var(--warning);box-shadow:0 0 0 2px rgba(0,0,0,.3)}
.feedgrid .brc{position:absolute;top:6px;left:6px;z-index:3;background:rgba(0,0,0,.5);color:#fff;
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;pointer-events:none}
.sbody .feedgrid{aspect-ratio:16/10;border-radius:var(--r2);margin-bottom:4px}
.feed.blur .scene{filter:blur(4px) brightness(.7)}
.feed.down{background:repeating-linear-gradient(45deg,#1a1a1a 0 14px,#111 14px 28px)}
.feed .ov{position:absolute;inset:0;padding:8px 10px;display:flex;flex-direction:column;
  justify-content:space-between;font-size:11px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.7)}
.feed .ovtop{display:flex;justify-content:space-between;align-items:center}
.rec{display:flex;align-items:center;gap:5px;font-weight:600;letter-spacing:.5px}
.rec b{width:7px;height:7px;border-radius:50%;background:#ff3b3b;animation:blink 1.2s infinite}
@keyframes blink{50%{opacity:.25}}
.ts{font-variant-numeric:tabular-nums;background:rgba(0,0,0,.4);padding:2px 6px;border-radius:5px}
.feed .cam{align-self:flex-start;background:rgba(0,0,0,.45);padding:2px 7px;border-radius:5px;font-weight:500}
.nosignal{position:absolute;inset:0;display:grid;place-items:center;color:#777;
  font-weight:600;font-size:13px;letter-spacing:1px;gap:6px;flex-direction:column;text-align:center}
.warntag{position:absolute;top:8px;left:8px;background:var(--warning);color:#111;font-weight:600;
  font-size:10px;padding:3px 8px;border-radius:50px}

.binfo{padding:12px 14px}
.brow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.bname{display:flex;align-items:center;gap:8px;min-width:0}
.bname .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bcode{font-size:11px;color:var(--fg3);font-weight:500}
.ip{font-size:12px;color:var(--fg3);font-variant-numeric:tabular-nums;margin-top:2px}
.badges{display:flex;gap:6px;margin-top:10px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;font-weight:500;padding:4px 9px;border-radius:50px;border:1px solid var(--border);
  display:flex;align-items:center;gap:5px;background:var(--bg3)}
.badge.ok{color:var(--online)} .badge.warn{color:var(--warning)} .badge.bad{color:var(--offline)}
.lat{margin-left:auto;font-size:11px;color:var(--fg3);font-variant-numeric:tabular-nums}
.spark{margin-top:11px;display:flex;align-items:center;gap:8px}
.spark svg{flex:1;height:26px}
.spark .pct{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}

.overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .25s}
.overlay.show{display:flex;opacity:1}
.sheet{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);width:100%;
  max-width:620px;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.35);
  transform:translateY(16px);transition:transform .25s var(--ease)}
.overlay.show .sheet{transform:none}
.shead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;
  border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2}
.shead .t{font-weight:600;font-size:16px;display:flex;align-items:center;gap:9px}
.sbody{padding:18px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.dcell{background:var(--bg3);border-radius:var(--r2);padding:11px 13px}
.dcell .k{font-size:11px;color:var(--fg3);font-weight:500}
.dcell .v{font-size:14px;font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums}
.sect{font-size:12px;color:var(--fg3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:18px 0 10px}
.log{display:flex;flex-direction:column;gap:0}
.logrow{display:flex;align-items:center;gap:11px;padding:9px 2px;border-bottom:1px solid var(--border);font-size:13px;position:relative;border-radius:8px}
.logrow:last-child{border-bottom:none}
.logrow[data-clickable="1"]{cursor:pointer}
.logrow[data-clickable="1"]:hover{background:var(--bg3)}
.logrow.active{background:color-mix(in srgb, var(--blue) 12%, transparent)}
.logrow .lt{color:var(--fg3);font-variant-numeric:tabular-nums;flex:none;width:62px}
.logrow .lm{color:var(--fg2);flex:1}
.viewlink{margin-left:auto;font-size:12px;color:var(--blue);font-weight:600;flex:none}
.bar{display:flex;gap:3px;align-items:flex-end;height:54px;margin-top:4px}
.bar i{flex:1;border-radius:3px 3px 0 0;background:var(--online);min-height:3px;transition:height .4s var(--ease)}
.bar i.w{background:var(--warning)} .bar i.d{background:var(--offline)} .bar i.n{background:var(--bg4)}
.axis{display:flex;justify-content:space-between;font-size:10px;color:var(--fg4);margin-top:5px}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:99;
  background:var(--fg);color:var(--bg);padding:11px 20px;border-radius:50px;font-size:13px;font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,.25);transition:transform .35s var(--ease);display:flex;align-items:center;gap:8px}
